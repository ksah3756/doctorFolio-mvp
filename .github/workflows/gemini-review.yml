name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini-review:
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          echo "Diff: $(wc -l < /tmp/pr.diff) lines"

      - name: Gemini review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import json, urllib.request, urllib.error, os, time
          diff = open('/tmp/pr.diff').read()[:40000]
          prompt = 'You are a code reviewer for a Next.js 15 TypeScript app.\n\nReview this PR diff. Focus on:\n1. TypeScript safety (no any, proper types)\n2. React/Next.js App Router best practices\n3. Security issues in API routes\n4. Test coverage gaps\n5. Code clarity\n\nBe concise. Flag blockers vs suggestions.\n\nDiff:\n' + diff
          payload = json.dumps({'contents': [{'parts': [{'text': prompt}]}], 'generationConfig': {'maxOutputTokens': 1024}}).encode()
          url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + os.environ['GEMINI_API_KEY']
          for attempt in range(3):
              try:
                  req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.loads(r.read())
                  open('/tmp/review.md', 'w').write(data['candidates'][0]['content']['parts'][0]['text'])
                  break
              except urllib.error.HTTPError as e:
                  if e.code == 429 and attempt < 2:
                      retry_after = e.headers.get('Retry-After')
                      wait = int(retry_after) if retry_after and retry_after.isdigit() else 30 * (attempt + 1)
                      print(f'Rate limited (429). Waiting {wait}s before retry {attempt + 2}/3...')
                      time.sleep(wait)
                  elif e.code == 429:
                      print('All retries exhausted (429). Writing fallback message.')
                      open('/tmp/review.md', 'w').write('> **Gemini 코드 리뷰를 일시적으로 사용할 수 없습니다.**\n>\n> Gemini API 요청 한도(429)에 도달했습니다. 잠시 후 PR을 닫았다가 다시 열거나, 수동으로 리뷰를 요청해 주세요.')
                  else:
                      raise
          "
          cat /tmp/review.md

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Gemini Code Review\n\n${review}\n\n---\n*Gemini 2.0 Flash*`
            });
