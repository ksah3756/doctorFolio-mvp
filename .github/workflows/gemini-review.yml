name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          echo "Diff: $(wc -l < /tmp/pr.diff) lines"

      - name: Gemini review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(head -c 40000 /tmp/pr.diff)
          PAYLOAD=$(jq -n --arg diff "$DIFF" '{
            "contents": [{"parts": [{"text": ("You are a code reviewer for a Next.js 15 TypeScript app.\n\nReview this PR diff. Focus on:\n1. TypeScript safety (no any, proper types)\n2. React/Next.js App Router best practices\n3. Security issues in API routes\n4. Test coverage gaps\n5. Code clarity\n\nBe concise. Flag blockers vs suggestions.\n\nDiff:\n```\n" + $diff + "\n```")}]},
            "generationConfig": {"maxOutputTokens": 1024}
          }')
          curl -sf -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            | jq -r '.candidates[0].content.parts[0].text' > /tmp/review.md
          cat /tmp/review.md

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Gemini Code Review\n\n${review}\n\n---\n*Gemini 2.0 Flash*`
            });
